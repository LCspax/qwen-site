<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千问AI - 下一代智能伙伴</title>
  <style>
    /* 内联样式确保主题色立即生效，避免闪烁 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0a0e1a;
      color: #e0e8ff;
    }
    html.light, html.light body {
      background-color: #ffffff !important;
      color: #000000;
    }
    html.dark, html.dark body {
      background-color: #0a0e1a !important;
      color: #e0e8ff;
    }
  </style>
  <script>
    // 在 React 加载前立即设置主题，避免闪烁
    (function() {
      const isInIframe = window.self !== window.top;

      function applyThemeToDOM(theme) {
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
        document.documentElement.setAttribute('data-theme', theme);
      }

      if (isInIframe) {
        // 监听父窗口主动推送的主题消息
        window.addEventListener('message', function(event) {
          if (event.data && typeof event.data.theme === 'string') {
            const theme = event.data.theme;
            if (theme === 'light' || theme === 'dark') {
              applyThemeToDOM(theme);
            }
          }
        });
      } else {
        // 非 iframe 环境，使用默认 dark 主题（匹配应用设计）
        applyThemeToDOM('dark');
      }
    })();
  </script>
</head>
<body>
  <div id="root">
    <!-- Fallback content when JS bundle is not loaded (e.g. opened directly without build) -->
    <div id="fallback-notice" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;text-align:center;padding:20px;">
      <h1 style="font-size:22px;font-weight:600;margin:0;color:#333;">千问AI - 下一代智能伙伴</h1>
      <p style="color:#888;margin:0;max-width:400px;line-height:1.6;">此页面需要 JavaScript 运行。请使用以下命令启动开发服务器：</p>
      <code style="background:#f0f0f0;color:#333;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;">pnpm dev</code>
      <p style="color:#aaa;font-size:13px;margin:0;">或构建生产版本：</p>
      <code style="background:#f0f0f0;color:#333;padding:12px 24px;border-radius:8px;font-size:14px;">pnpm build</code>
    </div>
  </div>
  <noscript>
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;">
      <p>请启用 JavaScript 以查看此页面。</p>
    </div>
  </noscript>
</body>
</html>
