<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87CEEB"/><stop offset="100%" stop-color="#B0E0E6"/></linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#555"/><stop offset="100%" stop-color="#444"/></linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="1200" height="800" fill="url(#sky)"/>
  <!-- Buildings left -->
  <rect x="0" y="80" width="180" height="380" fill="#8B7355" rx="4"/>
  <rect x="200" y="120" width="160" height="340" fill="#A0522D" rx="4"/>
  <rect x="380" y="60" width="140" height="400" fill="#7B6B5E" rx="4"/>
  <!-- Windows on buildings -->
  <g fill="#FFE4B5" opacity="0.7">
    <rect x="20" y="100" width="30" height="25"/><rect x="70" y="100" width="30" height="25"/><rect x="120" y="100" width="30" height="25"/>
    <rect x="20" y="140" width="30" height="25"/><rect x="70" y="140" width="30" height="25"/><rect x="120" y="140" width="30" height="25"/>
    <rect x="20" y="180" width="30" height="25"/><rect x="70" y="180" width="30" height="25"/><rect x="120" y="180" width="30" height="25"/>
    <rect x="220" y="150" width="30" height="25"/><rect x="270" y="150" width="30" height="25"/><rect x="320" y="150" width="30" height="25"/>
    <rect x="220" y="190" width="30" height="25"/><rect x="270" y="190" width="30" height="25"/><rect x="320" y="190" width="30" height="25"/>
    <rect x="400" y="90" width="25" height="22"/><rect x="435" y="90" width="25" height="22"/><rect x="470" y="90" width="25" height="22"/>
    <rect x="400" y="130" width="25" height="22"/><rect x="435" y="130" width="25" height="22"/><rect x="470" y="130" width="25" height="22"/>
  </g>
  <!-- Buildings right -->
  <rect x="680" y="100" width="140" height="360" fill="#9E8E7E" rx="4"/>
  <rect x="840" y="70" width="180" height="390" fill="#B8860B" rx="4"/>
  <rect x="1040" y="140" width="160" height="320" fill="#CD853F" rx="4"/>
  <g fill="#FFE4B5" opacity="0.7">
    <rect x="700" y="130" width="25" height="22"/><rect x="735" y="130" width="25" height="22"/><rect x="770" y="130" width="25" height="22"/>
    <rect x="700" y="170" width="25" height="22"/><rect x="735" y="170" width="25" height="22"/><rect x="770" y="170" width="25" height="22"/>
    <rect x="870" y="100" width="30" height="25"/><rect x="920" y="100" width="30" height="25"/><rect x="970" y="100" width="30" height="25"/>
    <rect x="870" y="140" width="30" height="25"/><rect x="920" y="140" width="30" height="25"/><rect x="970" y="140" width="30" height="25"/>
    <rect x="1060" y="170" width="30" height="25"/><rect x="1110" y="170" width="30" height="25"/>
  </g>
  <!-- Trees -->
  <rect x="550" y="280" width="12" height="80" fill="#5D4E37"/>
  <ellipse cx="556" cy="260" rx="35" ry="45" fill="#2E8B57"/>
  <rect x="620" y="300" width="10" height="60" fill="#5D4E37"/>
  <ellipse cx="625" cy="280" rx="28" ry="38" fill="#3CB371"/>
  <!-- Road -->
  <rect x="0" y="460" width="1200" height="340" fill="url(#road)"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#FFD700" stroke-width="4" stroke-dasharray="40 30"/>
  <!-- Sidewalk -->
  <rect x="0" y="430" width="1200" height="30" fill="#CCC"/>
  <!-- Car -->
  <rect x="100" y="490" width="200" height="70" fill="#1E90FF" rx="10"/>
  <rect x="120" y="470" width="140" height="30" fill="#4682B4" rx="8"/>
  <circle cx="130" cy="560" r="20" fill="#333"/><circle cx="270" cy="560" r="20" fill="#333"/>
  <circle cx="130" cy="560" r="10" fill="#888"/><circle cx="270" cy="560" r="10" fill="#888"/>
  <!-- Car 2 -->
  <rect x="700" y="510" width="180" height="65" fill="#DC143C" rx="10"/>
  <rect x="720" y="490" width="120" height="28" fill="#FF6347" rx="8"/>
  <circle cx="730" cy="575" r="18" fill="#333"/><circle cx="850" cy="575" r="18" fill="#333"/>
  <circle cx="730" cy="575" r="9" fill="#888"/><circle cx="850" cy="575" r="9" fill="#888"/>
  <!-- Pedestrians -->
  <circle cx="520" cy="415" r="8" fill="#F5DEB3"/>
  <rect x="514" y="423" width="12" height="20" fill="#FF6347"/>
  <circle cx="580" cy="410" r="8" fill="#F5DEB3"/>
  <rect x="574" y="418" width="12" height="20" fill="#4682B4"/>
  <!-- Traffic light -->
  <rect x="560" y="340" width="8" height="80" fill="#333"/>
  <rect x="550" y="330" width="28" height="20" fill="#333" rx="3"/>
  <circle cx="557" cy="340" r="4" fill="#FF0000"/>
  <circle cx="564" cy="340" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="571" cy="340" r="4" fill="#00FF00" opacity="0.3"/>
  <!-- Clouds -->
  <ellipse cx="300" cy="50" rx="80" ry="30" fill="white" opacity="0.6"/>
  <ellipse cx="900" cy="40" rx="100" ry="25" fill="white" opacity="0.5"/>
</svg>