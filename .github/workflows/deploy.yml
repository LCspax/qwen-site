name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  permissions:
      contents: write
  concurrency:
    group: github-pages
  environment:
      CI: false

  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm
        - run: npm ci
        - name: Install dependencies
          run: npm install
        - name: Build production
          run: npm run build
        - name: Deploy
          uses: peaceiris/actions/github-pages@v3
          with:
            personal_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./dist